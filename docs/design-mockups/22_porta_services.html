<!doctype html><html><head><meta charset="utf-8"><title>porta_services</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css"><style>
:root{
  --font-sans: system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono: ui-monospace,SFMono-Regular,Menlo,'JetBrains Mono',monospace;
  --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.20);
  --surface-0:#0d0d0f; --surface-1:#151517; --surface-2:#1b1c1f;
  --bg-accent: rgba(96,165,250,.15); --text-accent:#93c5fd;
  --text-primary:#e7e7ea; --text-secondary:#b6b6bb; --text-muted:#78787d;
  --text-success:#4ade80; --bg-success:rgba(74,222,128,.15); --fill-success:#4ade80;
  --text-warning:#fbbf24; --bg-warning:rgba(251,191,36,.15);
  --text-danger:#f87171; --bg-danger:rgba(248,113,113,.15);
}
*{box-sizing:border-box}
body{margin:0;padding:20px;background:var(--surface-0);color:var(--text-primary);font-family:var(--font-sans);}
</style></head><body><h2 class="sr-only">Services: cards for a running postgres and redis with status and port, and an add-service template picker.</h2>
<div style="padding:0.5rem 0; font-family:var(--font-sans); display:flex; flex-direction:column; gap:12px;">
  <div style="display:flex; align-items:center; gap:8px;"><span style="font-size:14px; font-weight:500;">Services</span><span style="font-size:11px; color:var(--text-secondary);">2 running</span><span style="margin-left:auto; font-size:11px; color:var(--text-accent); display:inline-flex; align-items:center; gap:3px;"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>Add service</span></div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
    <div style="border:0.5px solid var(--border); border-radius:10px; padding:11px 13px;">
      <div style="display:flex; align-items:center; gap:8px;"><i class="ti ti-database" style="font-size:17px; color:var(--text-secondary);" aria-hidden="true"></i><span style="font-size:13px; font-weight:500;">postgres</span><span style="margin-left:auto; width:7px;height:7px;border-radius:50%;background:var(--fill-success);"></span></div>
      <div style="font-size:11px; color:var(--text-secondary); margin-top:5px; font-family:var(--font-mono);">16.2 · :5432 · global</div>
      <div style="display:flex; gap:6px; margin-top:9px; font-size:11px;"><span style="border:0.5px solid var(--border-strong); border-radius:6px; padding:2px 9px;">Stop</span><span style="border:0.5px solid var(--border); border-radius:6px; padding:2px 9px; color:var(--text-secondary);">Logs</span><span style="border:0.5px solid var(--border); border-radius:6px; padding:2px 9px; color:var(--text-secondary);">Connect</span></div>
    </div>
    <div style="border:0.5px solid var(--border); border-radius:10px; padding:11px 13px;">
      <div style="display:flex; align-items:center; gap:8px;"><i class="ti ti-bolt" style="font-size:17px; color:var(--text-secondary);" aria-hidden="true"></i><span style="font-size:13px; font-weight:500;">redis</span><span style="margin-left:auto; width:7px;height:7px;border-radius:50%;background:var(--fill-success);"></span></div>
      <div style="font-size:11px; color:var(--text-secondary); margin-top:5px; font-family:var(--font-mono);">7.2 · :6379 · mediapress</div>
      <div style="display:flex; gap:6px; margin-top:9px; font-size:11px;"><span style="border:0.5px solid var(--border-strong); border-radius:6px; padding:2px 9px;">Stop</span><span style="border:0.5px solid var(--border); border-radius:6px; padding:2px 9px; color:var(--text-secondary);">Logs</span><span style="border:0.5px solid var(--border); border-radius:6px; padding:2px 9px; color:var(--text-secondary);">Connect</span></div>
    </div>
  </div>

  <div style="border:0.5px solid var(--border); border-radius:10px; padding:11px 13px;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); margin-bottom:8px;">Add from template</div>
    <div style="display:flex; flex-wrap:wrap; gap:7px;">
      <span style="font-size:12px; border:0.5px solid var(--border); border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-database" style="font-size:13px;" aria-hidden="true"></i>PostgreSQL</span>
      <span style="font-size:12px; border:0.5px solid var(--border); border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-database" style="font-size:13px;" aria-hidden="true"></i>MySQL</span>
      <span style="font-size:12px; border:0.5px solid var(--border); border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-bolt" style="font-size:13px;" aria-hidden="true"></i>Redis</span>
      <span style="font-size:12px; border:0.5px solid var(--border); border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-leaf" style="font-size:13px;" aria-hidden="true"></i>MongoDB</span>
      <span style="font-size:12px; border:0.5px solid var(--border); border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-mail" style="font-size:13px;" aria-hidden="true"></i>RabbitMQ</span>
    </div>
  </div>
</div></body></html>
