<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Git Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <!-- Tab bar -->
    <nav class="tabs">
      <button class="tab is-active" data-tab="status">Status</button>
      <button class="tab" data-tab="branches">Branches</button>
      <button class="tab" data-tab="sync">Sync</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="rebase">Rebase</button>
      <button class="tab" data-tab="stash">Stash</button>
      <div class="tab-spacer"></div>
      <span id="branch-chip" class="branch-chip" title="Current branch"></span>
      <button id="refresh-btn" class="icon-btn" title="Refresh">
        <svg viewBox="0 0 12 12" width="12" height="12" fill="none">
          <path d="M10 5.5A4 4 0 1 1 8.8 2.7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
          <path d="M10 1.5v3H7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </nav>

    <!-- Panes -->
    <main class="panes">
      <section class="pane is-active" data-pane="status">
        <div class="pane-inner" id="status-pane">
          <div class="loading">Loading…</div>
        </div>
      </section>
      <section class="pane" data-pane="branches">
        <div class="pane-inner" id="branches-pane"></div>
      </section>
      <section class="pane" data-pane="sync">
        <div class="pane-inner" id="sync-pane"></div>
      </section>
      <section class="pane" data-pane="history">
        <div class="pane-inner" id="history-pane"></div>
      </section>
      <section class="pane" data-pane="rebase">
        <div class="pane-inner" id="rebase-pane"></div>
      </section>
      <section class="pane" data-pane="stash">
        <div class="pane-inner" id="stash-pane"></div>
      </section>
    </main>

    <!-- Bottom output drawer -->
    <aside id="drawer" class="drawer">
      <div class="drawer-header">
        <span class="drawer-title">Output</span>
        <button id="drawer-clear" class="drawer-btn">clear</button>
        <button id="drawer-toggle" class="drawer-btn">hide</button>
      </div>
      <pre id="drawer-output" class="drawer-output"></pre>
    </aside>
  </div>

  <!-- Templates -->
  <template id="tpl-no-repo">
    <div class="empty">
      <p class="empty-title">No git repository</p>
      <p class="empty-sub">This app's root_dir is not a git repository.</p>
      <button class="btn-primary" data-act="init">Run <code>git init</code></button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
