<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Git Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <!-- Tab bar -->
    <nav class="tabs">
      <button class="tab is-active" data-tab="status" data-key="1">
        <span class="tab-label">Status</span>
        <span class="tab-badge" id="badge-status"></span>
      </button>
      <button class="tab" data-tab="branches" data-key="2">
        <span class="tab-label">Branches</span>
      </button>
      <button class="tab" data-tab="sync" data-key="3">
        <span class="tab-label">Sync</span>
      </button>
      <button class="tab" data-tab="history" data-key="4">
        <span class="tab-label">History</span>
      </button>
      <button class="tab" data-tab="rebase" data-key="5">
        <span class="tab-label">Rebase</span>
        <span class="tab-badge" id="badge-rebase"></span>
      </button>
      <button class="tab" data-tab="stash" data-key="6">
        <span class="tab-label">Stash</span>
        <span class="tab-badge" id="badge-stash"></span>
      </button>
      <button class="tab" data-tab="tags" data-key="7">
        <span class="tab-label">Tags</span>
        <span class="tab-badge" id="badge-tags"></span>
      </button>
      <div class="tab-spacer"></div>
      <span id="branch-chip" class="branch-chip" title="Current branch"></span>
      <button id="refresh-btn" class="icon-btn" title="Refresh (R)">
        <svg viewBox="0 0 12 12" width="12" height="12" fill="none">
          <path d="M10 5.5A4 4 0 1 1 8.8 2.7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
          <path d="M10 1.5v3H7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </nav>

    <!-- Panes -->
    <main class="panes">
      <section class="pane is-active" data-pane="status"></section>
      <section class="pane" data-pane="branches"></section>
      <section class="pane" data-pane="sync"></section>
      <section class="pane" data-pane="history"></section>
      <section class="pane" data-pane="rebase"></section>
      <section class="pane" data-pane="stash"></section>
      <section class="pane" data-pane="tags"></section>
    </main>

    <!-- Toast region — host overlays without disturbing layout -->
    <div id="toast-region" class="toast-region"></div>

    <!-- Modal confirmation -->
    <div id="modal-root" class="modal-root" hidden></div>
  </div>

  <!-- Templates -->
  <template id="tpl-no-repo">
    <div class="empty">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </div>
      <p class="empty-title">No git repository</p>
      <p class="empty-sub">This app's root directory isn't a git repo.</p>
      <button class="btn-primary" data-act="init">Run <code>git init</code></button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
