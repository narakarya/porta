name: Release

on:
  push:
    tags:
      - "v*"
  # Manual release: bumps the three version files, commits to main, tags, then
  # the matrix builds pick up the new tag. No need to bump/tag locally.
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, e.g. 0.5.69"
        required: true
        type: string

permissions:
  contents: write

# Opt every JavaScript-based action in this workflow into the Node.js 24
# runtime. GitHub starts forcing Node 24 on 2026-06-02 and removes Node 20
# entirely on 2026-09-16; setting this now silences the deprecation warning
# and means we don't have to re-bump individual `@vN` action tags every
# time an upstream cuts a Node-24-only release.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── 1. Resolve the tag (and create it on manual dispatch) ────────────────
  prepare:
    name: Prepare tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag (bump + commit + tag on manual dispatch)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"; V="${V#v}"
            node -e "const f='package.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            node -e "const f='src-tauri/tauri.conf.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            perl -0pi -e "s/^version = \"[^\"]*\"/version = \"$V\"/m" src-tauri/Cargo.toml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: release v$V"
            git tag "v$V"
            git push origin HEAD:main
            git push origin "v$V"
            echo "tag=v$V" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version sync (tag == package.json == tauri.conf.json == Cargo.toml)
        env:
          REL_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          TAG="${REL_TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$TAG package.json=$PKG tauri.conf.json=$CONF Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$CONF" ] || [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch — bump all three files to match tag $TAG before tagging."
            exit 1
          fi

      - name: Pre-create release shell (as draft)
        # Two reasons for `--draft`:
        # 1. Eliminates the race where both matrix jobs call `gh release
        #    create` simultaneously — when tauri-action looks up the tag the
        #    draft is already there, so it just appends assets.
        # 2. Crucially, a draft release is NOT "latest" on GitHub. Without
        #    this, the moment the first matrix job uploads an asset the
        #    release becomes "latest" even though latest.json hasn't been
        #    written yet — and every running Porta client fetching
        #    `releases/latest/download/latest.json` would 404 until
        #    merge-updater finishes. With the draft, the *previous*
        #    published release stays "latest" and clients keep working
        #    until merge-updater publishes this one.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --draft \
              --title "Porta $TAG" \
              --notes "See the full commit history for this release on GitHub."
          else
            echo "Release $TAG already exists, skipping create."
          fi

  # ─── 2. Build per-arch in parallel ────────────────────────────────────────
  #
  # Both jobs run on macos-latest (Apple Silicon). The aarch64 build is
  # native; the x86_64 build cross-compiles from ARM. We tried using
  # macos-13 for native Intel and the runner queued for 3+ hours — the
  # free-tier Intel image is too contested to rely on. Cross-compiling
  # adds maybe 30% to the Intel build time but the runners are always
  # available.
  #
  # Disable `includeUpdaterJson` here — the two jobs would otherwise race
  # on `latest.json` and the second to upload would clobber the other's
  # platform entry. The merge job at the end reconstructs a combined
  # `latest.json` from both signatures.
  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: Apple Silicon
          - target: x86_64-apple-darwin
            label: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable + ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Per-target cache so the two matrix jobs don't fight for the same
          # key. A stable prefix means a version bump that only touches
          # Porta's own version line still restores most deps.
          prefix-key: porta-${{ matrix.target }}

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload arch-specific bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization: intentionally NOT wired here.
          # See the long note in v0.5.66 / commit fbd1ec3 for why these env
          # vars must stay UNDEFINED (not even empty strings). Build is
          # unsigned; open via right-click → Open the first time.
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Porta ${{ needs.prepare.outputs.tag }}"
          releaseBody: "See the full commit history for this release on GitHub."
          # Keep the release as a draft so it doesn't become "latest" on
          # GitHub until merge-updater has written latest.json. tauri-action
          # honours this by passing `--draft` to the underlying gh call.
          releaseDraft: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, 'beta') || contains(needs.prepare.outputs.tag, 'alpha') || contains(needs.prepare.outputs.tag, 'rc') }}
          # No latest.json from individual jobs — see merge-updater below.
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

  # ─── 3. Construct the combined latest.json ────────────────────────────────
  #
  # Once both arch builds are in the release, list their .sig assets and
  # write a single latest.json that points the Tauri updater at the right
  # bundle for each platform. Without this, end users on the "other" arch
  # would either get no update or download the wrong binary.
  merge-updater:
    name: Merge updater manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Collect release notes
        id: notes
        run: |
          set -euo pipefail
          # CHANGELOG.md is the release note: for a stable release the release
          # script consolidates every beta section since the last stable one
          # into it, and a human polishes that before publishing. Reading it
          # here is what makes the update toast agree with the changelog
          # instead of listing raw commit subjects.
          #
          # This job only carries the tag, and CHANGELOG headings are bare
          # versions — strip the `v`. (Note the manifest's own `version` field
          # below still uses $TAG verbatim; that is untouched here.)
          VERSION="${TAG#v}"
          if node scripts/changelog-section.mjs "$VERSION" > /tmp/release-notes.txt; then
            echo "Using the CHANGELOG section for $VERSION."
          else
            # Resolve the previous version tag (sorted by semver). `grep -B1`
            # peeks at the line above the current tag in the sorted list.
            PREV=$(git tag --list 'v*' --sort=v:refname | grep -B1 -F "$TAG" | head -1 || true)
            if [ -z "$PREV" ] || [ "$PREV" = "$TAG" ]; then
              NOTES=$'Initial release'
            else
              # Bullet list of commit subjects since the last release. Cap at
              # 30 to keep the toast and release body readable; full log stays
              # on the GitHub commits page for archaeology.
              NOTES=$(git log --pretty=format:'- %s' "${PREV}..${TAG}" | head -30)
              if [ -z "$NOTES" ]; then NOTES=$'No commit log entries between '"$PREV"' and '"$TAG"; fi
            fi
            printf '%s\n' "$NOTES" > /tmp/release-notes.txt
            echo "::warning::No CHANGELOG section for $VERSION; fell back to commit subjects."
          fi
          echo "── Release notes ──"
          cat /tmp/release-notes.txt

      - name: Fetch arch signatures + compose latest.json
        run: |
          set -euo pipefail
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(cat /tmp/release-notes.txt)

          # The .sig asset names follow `Porta_<arch>.app.tar.gz.sig` in
          # Tauri 2 (`aarch64` for ARM, `x64`/`x86_64` for Intel). We resolve
          # them by listing release assets rather than hardcoding the exact
          # names so a future Tauri rename doesn't silently break us.
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Found assets:"
          echo "$assets"

          arm_sig_name=$(echo "$assets" | grep -E 'aarch64.*\.app\.tar\.gz\.sig$' | head -1 || true)
          intel_sig_name=$(echo "$assets" | grep -E '(x64|x86_64).*\.app\.tar\.gz\.sig$' | head -1 || true)
          if [ -z "$arm_sig_name" ] || [ -z "$intel_sig_name" ]; then
            echo "::error::Missing signature asset. arm='$arm_sig_name' intel='$intel_sig_name'"
            exit 1
          fi
          arm_bundle_name="${arm_sig_name%.sig}"
          intel_bundle_name="${intel_sig_name%.sig}"

          base="https://github.com/$REPO/releases/download/$TAG"

          # Download the .sig files (their full file contents are what goes
          # into latest.json's `signature` field — not a URL).
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "$arm_sig_name"   --dir /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "$intel_sig_name" --dir /tmp/sigs

          # `$(cat …)` strips trailing newlines; the append-x trick preserves
          # them so the signature byte-for-byte matches what minisign emitted.
          arm_sig=$(cat "/tmp/sigs/$arm_sig_name"; echo x); arm_sig="${arm_sig%x}"
          intel_sig=$(cat "/tmp/sigs/$intel_sig_name"; echo x); intel_sig="${intel_sig%x}"

          jq -n \
            --arg version  "$TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "$NOTES" \
            --arg arm_sig  "$arm_sig" \
            --arg arm_url  "$base/$arm_bundle_name" \
            --arg intel_sig "$intel_sig" \
            --arg intel_url "$base/$intel_bundle_name" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $arm_sig,   url: $arm_url },
                "darwin-x86_64":  { signature: $intel_sig, url: $intel_url }
              }
            }' > latest.json

          echo "── latest.json ──"
          cat latest.json

      - name: Upload latest.json to release
        run: |
          gh release upload "$TAG" --repo "$REPO" latest.json --clobber

      - name: Update release body with generated changelog
        # The release body was set to a placeholder during build. Now that
        # we've computed the actual commit-derived notes, replace it so the
        # GitHub Releases page shows the same content the in-app updater
        # toast reads from latest.json.
        run: |
          gh release edit "$TAG" --repo "$REPO" --notes-file /tmp/release-notes.txt

      - name: Publish release (drop draft flag)
        # Only now do we make the release visible as "latest" on GitHub. The
        # draft → published transition is atomic from the client's point of
        # view: all assets (both arches' DMGs + bundles + signatures + the
        # merged latest.json) appear at once, so the updater can fetch
        # latest.json in the same poll where it first sees the release.
        run: |
          gh release edit "$TAG" --repo "$REPO" --draft=false
