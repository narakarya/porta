name: Release

on:
  push:
    tags:
      - "v*"
  # Manual release: bumps the three version files, commits to main, tags, and
  # builds — all in one run. No need to bump/tag locally.
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, e.g. 0.5.64"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Manual dispatch bumps + tags on main; tag pushes build the tag as-is.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag (bump + commit + tag on manual dispatch)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"; V="${V#v}"
            node -e "const f='package.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            node -e "const f='src-tauri/tauri.conf.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            perl -0pi -e "s/^version = \"[^\"]*\"/version = \"$V\"/m" src-tauri/Cargo.toml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: release v$V"
            git tag "v$V"
            git push origin HEAD:main
            git push origin "v$V"
            echo "tag=v$V" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version sync (tag == package.json == tauri.conf.json == Cargo.toml)
        env:
          REL_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          TAG="${REL_TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$TAG package.json=$PKG tauri.conf.json=$CONF Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$CONF" ] || [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch — bump all three files to match tag $TAG before tagging."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable + universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signature (minisign) — required for auto-update. Already configured.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization: intentionally NOT wired here.
          #
          # These env vars must stay UNDEFINED when signing is off. Mapping them
          # to an empty string still *defines* the variable, and tauri-bundler
          # treats a defined (even empty) APPLE_CERTIFICATE as "import this cert"
          # → runs `security import` with empty data → fails the build. So we
          # leave them out entirely; the build is unsigned (open via right-click
          # → Open once on first launch), exactly like earlier releases.
          #
          # To enable signing later, add a dedicated signed-release workflow (or
          # a job guarded by an environment) that sets these only when present:
          #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          #   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # Do NOT add them as plain `KEY: ${{ secrets.X }}` lines — inherited
          # org-level secrets would re-break the unsigned build.
        with:
          tagName: ${{ steps.resolve.outputs.tag }}
          releaseName: "Porta ${{ steps.resolve.outputs.tag }}"
          releaseBody: "See the full commit history for this release on GitHub."
          releaseDraft: false
          prerelease: ${{ contains(steps.resolve.outputs.tag, 'beta') || contains(steps.resolve.outputs.tag, 'alpha') || contains(steps.resolve.outputs.tag, 'rc') }}
          includeUpdaterJson: true
          args: --target universal-apple-darwin
