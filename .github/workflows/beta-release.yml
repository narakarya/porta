name: Beta Release

# Publishes the opt-in **beta channel**. Unlike the stable `release.yml` (which
# uploads a versioned release and flips GitHub's "latest"), this workflow always
# publishes to a single, force-moved `beta` release so the fixed updater
# endpoint `releases/download/beta/latest.json` — the one `updater_channel.rs`'
# `BETA_ENDPOINT` points at — always resolves to the newest beta build.
#
# It builds the SAME "Porta" app as stable (identifier `dev.narakarya.porta`),
# so a beta build updates in place and shares the same `~/.porta` data dir. The
# beta version carries a `-beta.N` prerelease suffix so semver orders it above
# the current stable and, once stable catches up to the same X.Y.Z, moves the
# opt-in tester back onto the stable channel automatically.
#
# Trigger: push a tag `beta-v<version>` whose `<version>` matches the version in
# package.json / tauri.conf.json / Cargo.toml, e.g. `beta-v0.12.0-beta.1`. The
# `beta-` prefix keeps it out of `release.yml`'s `v*` trigger, so the two
# pipelines never both fire on one tag.

on:
  push:
    tags:
      - "beta-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── 1. Verify the version + (re)create the fixed `beta` release ───────────
  prepare:
    name: Prepare beta release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve + verify version (tag beta-v<version> == the three files)
        id: resolve
        run: |
          set -euo pipefail
          # Trigger tag is `beta-v<version>`; strip the `beta-v` prefix.
          TRIGGER="${GITHUB_REF_NAME}"
          VER="${TRIGGER#beta-v}"
          PKG=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag-version=$VER package.json=$PKG tauri.conf.json=$CONF Cargo.toml=$CARGO"
          if [ "$VER" != "$PKG" ] || [ "$VER" != "$CONF" ] || [ "$VER" != "$CARGO" ]; then
            echo "::error::Version mismatch — the beta-v<version> tag must equal package.json/tauri.conf.json/Cargo.toml. Bump all three to $VER before tagging."
            exit 1
          fi
          case "$VER" in
            *-beta*|*-alpha*|*-rc*) : ;;
            *) echo "::error::Beta version '$VER' must carry a prerelease suffix (e.g. -beta.1) so the updater orders it correctly."; exit 1 ;;
          esac
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Force-move the `beta` release + tag to this commit (as draft)
        # Delete any prior `beta` release AND its git tag, then recreate the
        # release (which also creates the `beta` tag) at this commit. Draft +
        # prerelease so it never becomes GitHub "latest" and stable clients
        # polling `releases/latest/download/latest.json` are untouched. The
        # merge job flips off the draft once latest.json is written.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view beta --repo "$REPO" >/dev/null 2>&1; then
            gh release delete beta --repo "$REPO" --cleanup-tag --yes
          fi
          gh release create beta \
            --repo "$REPO" \
            --target "$SHA" \
            --draft \
            --prerelease \
            --title "Porta Beta $VERSION" \
            --notes "Opt-in beta build. Enable Settings → About → Beta updates to receive these."

  # ─── 2. Build per-arch in parallel (regular "Porta", same identifier) ──────
  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: Apple Silicon
          - target: x86_64-apple-darwin
            label: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable + ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: porta-beta-${{ matrix.target }}

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload arch-specific bundle to the beta release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing/notarization intentionally NOT wired (matches
          # release.yml) — the build is unsigned; open via right-click → Open
          # the first time.
        with:
          # Publish to the fixed `beta` release, NOT a versioned tag. Draft is
          # kept so the release only goes live once merge-updater writes
          # latest.json. Same regular config as stable → same app identifier →
          # same ~/.porta data dir.
          tagName: beta
          releaseName: "Porta Beta ${{ needs.prepare.outputs.version }}"
          releaseBody: "Opt-in beta build. Enable Settings → About → Beta updates to receive these."
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

  # ─── 3. Compose the combined latest.json for the beta channel ──────────────
  merge-updater:
    name: Merge beta updater manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate changelog notes from recent commits
        id: notes
        run: |
          set -euo pipefail
          # No reliable "previous beta" anchor, so summarise the most recent
          # commit subjects. Full history stays on the commits page.
          NOTES=$(git log --pretty=format:'- %s' -30 || true)
          if [ -z "$NOTES" ]; then NOTES=$'Beta build'; fi
          printf '%s\n' "$NOTES" > /tmp/release-notes.txt
          echo "── Generated notes ──"; cat /tmp/release-notes.txt

      - name: Fetch arch signatures + compose latest.json
        run: |
          set -euo pipefail
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(cat /tmp/release-notes.txt)

          assets=$(gh release view beta --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Found assets:"; echo "$assets"

          arm_sig_name=$(echo "$assets" | grep -E 'aarch64.*\.app\.tar\.gz\.sig$' | head -1 || true)
          intel_sig_name=$(echo "$assets" | grep -E '(x64|x86_64).*\.app\.tar\.gz\.sig$' | head -1 || true)
          if [ -z "$arm_sig_name" ] || [ -z "$intel_sig_name" ]; then
            echo "::error::Missing signature asset. arm='$arm_sig_name' intel='$intel_sig_name'"
            exit 1
          fi
          arm_bundle_name="${arm_sig_name%.sig}"
          intel_bundle_name="${intel_sig_name%.sig}"

          # Assets live on the fixed `beta` release, so the updater URLs are the
          # stable `releases/download/beta/...` path `BETA_ENDPOINT` expects.
          base="https://github.com/$REPO/releases/download/beta"

          mkdir -p /tmp/sigs
          gh release download beta --repo "$REPO" --pattern "$arm_sig_name"   --dir /tmp/sigs
          gh release download beta --repo "$REPO" --pattern "$intel_sig_name" --dir /tmp/sigs

          arm_sig=$(cat "/tmp/sigs/$arm_sig_name"; echo x); arm_sig="${arm_sig%x}"
          intel_sig=$(cat "/tmp/sigs/$intel_sig_name"; echo x); intel_sig="${intel_sig%x}"

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "$NOTES" \
            --arg arm_sig  "$arm_sig" \
            --arg arm_url  "$base/$arm_bundle_name" \
            --arg intel_sig "$intel_sig" \
            --arg intel_url "$base/$intel_bundle_name" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $arm_sig,   url: $arm_url },
                "darwin-x86_64":  { signature: $intel_sig, url: $intel_url }
              }
            }' > latest.json

          echo "── latest.json ──"; cat latest.json

      - name: Upload latest.json to the beta release
        run: |
          gh release upload beta --repo "$REPO" latest.json --clobber

      - name: Update beta release body with generated changelog
        run: |
          gh release edit beta --repo "$REPO" --notes-file /tmp/release-notes.txt

      - name: Publish the beta release (drop draft flag)
        run: |
          gh release edit beta --repo "$REPO" --draft=false --prerelease

      - name: Publish a per-version archival release page
        # In addition to the rolling `beta` release (which the updater reads via
        # the fixed releases/download/beta/latest.json endpoint — left untouched),
        # publish a versioned prerelease at the `beta-v<version>` trigger tag so
        # each beta has its own human-readable release page + notes + installers.
        # This is purely archival: the updater never reads this release.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Human-facing installers from the rolling beta release.
          mkdir -p /tmp/dist
          gh release download beta --repo "$REPO" --pattern '*.dmg' --dir /tmp/dist
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --prerelease \
              --title "Porta Beta $VERSION" --notes-file /tmp/release-notes.txt
            gh release upload "$TAG" --repo "$REPO" /tmp/dist/*.dmg --clobber
          else
            gh release create "$TAG" --repo "$REPO" --prerelease \
              --title "Porta Beta $VERSION" --notes-file /tmp/release-notes.txt \
              /tmp/dist/*.dmg
          fi
