name: Beta Release

# Publishes the opt-in **beta channel**. Unlike the stable `release.yml` (which
# uploads a versioned release and flips GitHub's "latest"), this workflow keeps
# a single permanent `beta` release holding nothing but `latest.json`, so the
# fixed updater endpoint `releases/download/beta/latest.json` — the one
# `updater_channel.rs`' `BETA_ENDPOINT` points at — always resolves.
#
# The build artifacts live on the per-version `beta-v<version>` release that the
# trigger tag names, and `latest.json` points at THOSE urls. That split is what
# keeps the channel readable while a release is being built:
#
#   - `beta` is never deleted, so the endpoint never 404s. It used to be torn
#     down and recreated as a draft at the START of the run, which left the
#     endpoint dead for the ~10 minutes a build takes — a client checking for
#     updates in that window got "Could not fetch a valid release JSON".
#   - Artifact names are unique per version, so a build in flight can never
#     overwrite the bundle a live `latest.json` still points at (which would
#     break signature verification for anyone downloading right then).
#
# `latest.json` is written LAST, as a single clobber. Until that moment clients
# see the previous beta, whole and consistent.
#
# It builds the SAME "Porta" app as stable (identifier `dev.narakarya.porta`),
# so a beta build updates in place and shares the same `~/.porta` data dir. The
# beta version carries a `-beta.N` prerelease suffix so semver orders it above
# the current stable and, once stable catches up to the same X.Y.Z, moves the
# opt-in tester back onto the stable channel automatically.
#
# Trigger: push a tag `beta-v<version>` whose `<version>` matches the version in
# package.json / tauri.conf.json / Cargo.toml, e.g. `beta-v0.12.0-beta.1`. The
# `beta-` prefix keeps it out of `release.yml`'s `v*` trigger, so the two
# pipelines never both fire on one tag.

on:
  push:
    tags:
      - "beta-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── 1. Verify the version + open the versioned release as a draft ────────
  prepare:
    name: Prepare beta release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve + verify version (tag beta-v<version> == the three files)
        id: resolve
        run: |
          set -euo pipefail
          # Trigger tag is `beta-v<version>`; strip the `beta-v` prefix.
          TRIGGER="${GITHUB_REF_NAME}"
          VER="${TRIGGER#beta-v}"
          PKG=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag-version=$VER package.json=$PKG tauri.conf.json=$CONF Cargo.toml=$CARGO"
          if [ "$VER" != "$PKG" ] || [ "$VER" != "$CONF" ] || [ "$VER" != "$CARGO" ]; then
            echo "::error::Version mismatch — the beta-v<version> tag must equal package.json/tauri.conf.json/Cargo.toml. Bump all three to $VER before tagging."
            exit 1
          fi
          case "$VER" in
            *-beta*|*-alpha*|*-rc*) : ;;
            *) echo "::error::Beta version '$VER' must carry a prerelease suffix (e.g. -beta.1) so the updater orders it correctly."; exit 1 ;;
          esac
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Open the versioned release as a draft
        # Create the `beta-v<version>` release up front so the two matrix build
        # jobs upload into an existing release instead of racing to create it.
        # Draft + prerelease: the assets stay unreachable until merge-updater
        # publishes it, which is what lets `latest.json` be the last thing that
        # changes. The permanent `beta` release is NOT touched here — that is
        # the whole point, it must keep serving the previous manifest until the
        # new build is ready.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$REPO" \
            --draft \
            --prerelease \
            --title "Porta Beta $VERSION" \
            --notes "Opt-in beta build. Enable Settings → About → Beta updates to receive these."

  # ─── 2. Build per-arch in parallel (regular "Porta", same identifier) ──────
  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: Apple Silicon
          - target: x86_64-apple-darwin
            label: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable + ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: porta-beta-${{ matrix.target }}

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload arch-specific bundle to the versioned release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing/notarization intentionally NOT wired (matches
          # release.yml) — the build is unsigned; open via right-click → Open
          # the first time.
        with:
          # Upload to the per-version release, NOT the fixed `beta` one. Asset
          # names therefore carry this version and can never collide with the
          # bundle the live `latest.json` still points at. Draft is kept so the
          # release only goes live once merge-updater has the manifest ready.
          # Same regular config as stable → same app identifier → same
          # ~/.porta data dir.
          tagName: ${{ github.ref_name }}
          releaseName: "Porta Beta ${{ needs.prepare.outputs.version }}"
          releaseBody: "Opt-in beta build. Enable Settings → About → Beta updates to receive these."
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

  # ─── 3. Compose the combined latest.json for the beta channel ──────────────
  merge-updater:
    name: Merge beta updater manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate changelog notes from recent commits
        id: notes
        run: |
          set -euo pipefail
          # No reliable "previous beta" anchor, so summarise the most recent
          # commit subjects. Full history stays on the commits page.
          NOTES=$(git log --pretty=format:'- %s' -30 || true)
          if [ -z "$NOTES" ]; then NOTES=$'Beta build'; fi
          printf '%s\n' "$NOTES" > /tmp/release-notes.txt
          echo "── Generated notes ──"; cat /tmp/release-notes.txt

      - name: Fetch arch signatures + compose latest.json
        run: |
          set -euo pipefail
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(cat /tmp/release-notes.txt)

          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Found assets:"; echo "$assets"

          arm_sig_name=$(echo "$assets" | grep -E 'aarch64.*\.app\.tar\.gz\.sig$' | head -1 || true)
          intel_sig_name=$(echo "$assets" | grep -E '(x64|x86_64).*\.app\.tar\.gz\.sig$' | head -1 || true)
          if [ -z "$arm_sig_name" ] || [ -z "$intel_sig_name" ]; then
            echo "::error::Missing signature asset. arm='$arm_sig_name' intel='$intel_sig_name'"
            exit 1
          fi
          arm_bundle_name="${arm_sig_name%.sig}"
          intel_bundle_name="${intel_sig_name%.sig}"

          # Bundles live on the per-version release; only latest.json itself
          # sits on the fixed `beta` release that BETA_ENDPOINT reads. These
          # urls are therefore immutable once published.
          base="https://github.com/$REPO/releases/download/$TAG"

          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "$arm_sig_name"   --dir /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "$intel_sig_name" --dir /tmp/sigs

          arm_sig=$(cat "/tmp/sigs/$arm_sig_name"; echo x); arm_sig="${arm_sig%x}"
          intel_sig=$(cat "/tmp/sigs/$intel_sig_name"; echo x); intel_sig="${intel_sig%x}"

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "$NOTES" \
            --arg arm_sig  "$arm_sig" \
            --arg arm_url  "$base/$arm_bundle_name" \
            --arg intel_sig "$intel_sig" \
            --arg intel_url "$base/$intel_bundle_name" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $arm_sig,   url: $arm_url },
                "darwin-x86_64":  { signature: $intel_sig, url: $intel_url }
              }
            }' > latest.json

          echo "── latest.json ──"; cat latest.json

      # Order matters from here down. The versioned release must be live BEFORE
      # latest.json names its urls, and latest.json must be the LAST thing that
      # changes — it is the single switch that moves clients onto this build.

      - name: Publish the versioned release (drop draft flag)
        run: |
          set -euo pipefail
          gh release edit "$TAG" --repo "$REPO" \
            --draft=false --prerelease \
            --title "Porta Beta $VERSION" \
            --notes-file /tmp/release-notes.txt

      - name: Ensure the permanent `beta` release exists
        # Only ever created, never deleted or moved — deleting it is what used
        # to blank the updater endpoint mid-run. On an established repo this is
        # a no-op; it exists so a fresh fork can bootstrap the channel.
        run: |
          set -euo pipefail
          if gh release view beta --repo "$REPO" >/dev/null 2>&1; then
            echo "beta release present."
          else
            gh release create beta \
              --repo "$REPO" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --title "Porta Beta channel" \
              --notes "Updater manifest for the opt-in beta channel. Installers live on each beta-v<version> release."
          fi

      - name: Point the beta channel at this build (single atomic switch)
        run: |
          set -euo pipefail
          gh release upload beta --repo "$REPO" latest.json --clobber
          echo "Beta channel now serves $VERSION."

      - name: Prune stale bundles from the `beta` release
        # Older betas uploaded their bundles here, back when `beta` doubled as
        # the artifact store. Those are dead weight now that latest.json points
        # at the versioned release — but they are only safe to remove AFTER the
        # new manifest is live, since the previous one still referenced them.
        run: |
          set -euo pipefail
          stale=$(gh release view beta --repo "$REPO" --json assets \
            --jq '.assets[].name | select(. != "latest.json")' || true)
          if [ -z "$stale" ]; then
            echo "Nothing to prune."
            exit 0
          fi
          echo "$stale" | while read -r name; do
            [ -n "$name" ] || continue
            echo "Deleting stale asset: $name"
            gh release delete-asset beta "$name" --repo "$REPO" --yes
          done
